services:
  mysql:
    image: docker.1ms.run/library/mysql:8.0
    container_name: go-admin-edu-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Aa$$123456
      MYSQL_DATABASE: go_admin_edu
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - /opt/go-admin-edu/data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pAa$$123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: docker.1ms.run/library/redis:7-alpine
    container_name: go-admin-edu-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data

  minio:
    image: docker.1ms.run/minio/minio:latest
    container_name: go-admin-edu-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api:
    image: docker.1ms.run/library/alpine:3.21
    container_name: go-admin-edu-api
    restart: unless-stopped
    working_dir: /app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts/api/go-admin:/main:ro
      - ../go-admin/config/settings.docker.yml:/config/settings.yml:ro
      - ../go-admin/config:/app/config:ro
      - api-static:/app/static
      - api-temp:/app/temp
    command: ["sh", "-c", "mkdir -p temp/logs && /main server -c /config/settings.yml"]

  admin-web:
    image: docker.1ms.run/library/nginx:1.27-alpine
    container_name: go-admin-edu-admin
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "18080:80"
    volumes:
      - ./artifacts/admin:/usr/share/nginx/html:ro
      - ../web/apps/admin/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  portal-web:
    image: docker.1ms.run/library/nginx:1.27-alpine
    container_name: go-admin-edu-portal
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "18081:80"
    volumes:
      - ./artifacts/portal:/usr/share/nginx/html:ro
      - ../web/apps/portal/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  redis-data:
  minio-data:
  api-static:
  api-temp:
